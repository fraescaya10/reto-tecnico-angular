@if (dialogService.config(); as config) {
<div class="dialog-overlay" role="dialog" aria-modal="true" [attr.aria-label]="config.title" (click)="dialogService.cancel()">
  <div class="dialog-card" (click)="$event.stopPropagation()">
    <h2 class="dialog-card__title">{{ config.title }}</h2>
    <p class="dialog-card__message">{{ config.message }}</p>
    <div class="dialog-card__actions">
      <button class="secondary-button" type="button" (click)="dialogService.cancel()">
        {{ config.cancelLabel }}
      </button>
      <button class="danger-button" type="button" (click)="dialogService.confirm()">
        {{ config.confirmLabel }}
      </button>
    </div>
  </div>
</div>
}
