<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <rect width="40" height="40" rx="20" fill="#b7b7b9"/>
  <!-- Coin outline -->
  <circle cx="20" cy="20" r="10" stroke="#e3e3e3" stroke-width="1.5"/>
  <!-- Dollar sign -->
  <text x="20" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#e3e3e3">$</text>
</svg>
